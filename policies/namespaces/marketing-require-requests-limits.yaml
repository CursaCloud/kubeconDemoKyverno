apiVersion: kyverno.io/v1
kind: Policy
metadata:
  name: marketing-require-requests-limits
  namespace: marketing
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-cpu-memory-requests-limits
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "Containers must set CPU and memory requests/limits."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
