apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
        # owner label intentionally missing
    spec:
      containers:
        - name: api
          image: nginx:1.25
          ports:
            - containerPort: 80
