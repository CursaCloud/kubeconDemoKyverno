apiVersion: v1
kind: Pod
metadata:
  name: data-scraper
  namespace: data-platform
  labels:
    app: data-scraper
    owner: data
spec:
  containers:
    - name: scraper
      image: busybox:1.36
      command: ["/bin/sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: host-logs
          mountPath: /host-logs
  volumes:
    - name: host-logs
      hostPath:
        path: /var/log
        type: Directory
