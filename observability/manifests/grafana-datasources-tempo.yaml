apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources-tempo
  namespace: observability
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc:3100
        editable: true
